<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR Code Auto Generator</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background: #f5f5f5;
      text-align: center;
    }
    input {
      padding: 10px;
      font-size: 16px;
      width: 80%;
      max-width: 400px;
      margin: 10px auto;
      display: block;
    }
    #qrcode {
      margin-top: 20px;
    }
    #downloadBtn {
      display: none;
      margin-top: 10px;
      padding: 10px;
      font-size: 16px;
      background: #28a745;
      color: #fff;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h2>🧠 QR Code Generator Otomatis</h2>
  <input type="text" id="qrtext" placeholder="Ketik teks/link apa saja...">
  <button id="downloadBtn" onclick="downloadQR()">⬇️ Download PNG</button>

  <div id="qrcode"></div>

  <script>
    let qrcode = new QRCode("qrcode", {
      text: "",
      width: 200,
      height: 200,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });

    const input = document.getElementById("qrtext");
    const qrcodeContainer = document.getElementById("qrcode");
    const downloadBtn = document.getElementById("downloadBtn");

    input.addEventListener("input", () => {
      const value = input.value.trim();
      qrcodeContainer.innerHTML = "";

      if (value !== "") {
        new QRCode(qrcodeContainer, {
          text: value,
          width: 200,
          height: 200,
          colorDark: "#000000",
          colorLight: "#ffffff",
          correctLevel: QRCode.CorrectLevel.H
        });
        downloadBtn.style.display = "inline-block";
      } else {
        downloadBtn.style.display = "none";
      }
    });

    function downloadQR() {
      const qrCanvas = document.querySelector("#qrcode canvas");
      if (!qrCanvas) {
        alert("QR belum dibuat, Pak.");
        return;
      }
      const link = document.createElement("a");
      link.href = qrCanvas.toDataURL("image/png");
      link.download = "qr-code.png";
      link.click();
    }
  </script>

</body>
</html>
